min_version: 2.1.4

commit-msg:
  jobs:
    - name: commitlint
      run: aubx commitlint --edit {1}

post-merge:
  jobs:
    - name: aube-install
      run: aube install

pre-commit:
  parallel: true
  jobs:
    - name: biome-json
      glob:
        - "*.css"
        - "*.html"
        - "*.json"
        - "*.jsonc"
        - "*.grit"
        - "*.code-workspace"
      run: aube run biome:check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    - name: js-ts-fix
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
      run: |
        aube run oxc --fix {staged_files}
        aube run biome:check --write --no-errors-on-unmatched {staged_files}
        aube run format {staged_files}
      stage_fixed: true

    - name: format-json5-mdx
      glob:
        - "*.json5"
        - "*.mdx"
      run: aube run format {staged_files}
      stage_fixed: true

    - name: md-fix
      glob: "*.md"
      run: |
        rumdl check --fix {staged_files}
        rumdl fmt {staged_files}
      stage_fixed: true

    - name: toml-fix
      glob: "*.toml"
      run: |
        tombi lint {staged_files}
        tombi format {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: biome-ci
      run: aube run biome:ci

    - name: oxc
      run: aube run oxc .

    - name: type-check
      run: aube run type-check

    - name: knip
      run: aube run knip

    - name: build
      run: aube run build

    - name: test-documentation
      run: aube run test tests/documentation/rule-stats.test.ts
