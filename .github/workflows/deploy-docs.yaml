name: Deploy Documentation

on:
  workflow_run:
    workflows: ["Publish Package"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if:
      ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Mise
        uses: jdx/mise-action@v2

      - name: Cache Aube store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/aube/store
            ~/.cache/aube
          key: ${{ runner.os }}-aube-v3-${{ hashFiles('aube-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-aube-v3-

      - name: Setup Node.js for documentation build
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if aube ci --enable-global-virtual-store --fetch-retries 5 --fetch-timeout 60000 --fetch-retry-maxtimeout 20000; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Build documentation
        run: aube run -F docs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if:
      ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success') }}
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
