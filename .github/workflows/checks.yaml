name: Checks

on:
  workflow_call:

permissions: {}

env:
  TEST_SHARDS: 8

jobs:
  check:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Biome
        run: node --run biome -- ci

      - name: Lint
        run: node --run oxlint

      - name: Generate documentation types
        run: pnpm --filter docs astro sync

      - name: Type Check
        run: node --run type-check

      - name: Knip
        run: node --run knip

      - name: Build
        run: node --run build -- --minify && test -f dist/index.js

  test:
    name: Test (${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Get shard test files
        id: shard
        run: |
          SHARD_FILES=$(./scripts/shard-tests.ts --normal-lane ${{ matrix.shard }} ${{ env.TEST_SHARDS }})
          if [ "${{ matrix.shard }}" = "${{ env.TEST_SHARDS }}" ]; then
            SHARD_FILES="$SHARD_FILES tests/upstream/prevent-abbreviations.test.ts"
          fi
          echo "files=$SHARD_FILES" >> "$GITHUB_OUTPUT"
          echo "Shard ${{ matrix.shard }}/${{ env.TEST_SHARDS }} files: $SHARD_FILES"

      - name: Run tests for shard
        if: steps.shard.outputs.files != ''
        run: node --run test -- --reporter github-actions --reporter dot ${{ steps.shard.outputs.files }}
