min_version = "2026.6.14"

[tools]
"github:howmanysmall/pullhook" = "latest"
bun = "latest"
hk = "latest"
node = "25"
rumdl = "latest"
tombi = "latest"
pkl = "latest"
nub = "latest"
pnpm = "11.9.0"
ni = "latest"

[env]
PROJECT_NAME = "{{ config_root | basename }}"
_.path = ["./node_modules/.bin"]

[tasks.install]
description = "Install root and documentation dependencies with pnpm."
run = "nci"

[tasks.lint]
description = "Run the project lint pipeline."
run = "node --run lint"

[tasks.test]
description = "Run the Vitest suite."
env = { AGENT = "1" }
run = "node --run test"

[tasks.build]
description = "Build the plugin with the Bun-run TypeScript build script."
run = "node --run build"

[tasks.type-check]
description = "Run tsgo type checking."
run = "node --run type-check"

[tasks.check]
depends = ["lint", "type-check", "build"]
description = "Run the standard non-test verification checks."
